spring:
  application:
    name: cart-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/cart_db?serverTimezone=UTC
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        delay_entity_loader_creations: true
  mvc:
    servlet:
      path: /api

server:
  port: 8003

jwt:
  secret: ${JWT_SECRET}

internal:
  token: ${INTERNAL_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never