server:
  port: ${GATEWAY_PORT:8765}

spring:
  cloud:
    loadbalancer:
      cache:
        ttl: 5s
        capacity: 256
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/auth/**
            - id: book-service
              uri: lb://book-service
              predicates:
                - Path=/api/books/**, /api/categories/**
            - id: cart-service
              uri: lb://cart-service
              predicates:
                - Path=/api/cart/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true
      