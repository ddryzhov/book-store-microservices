spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  jackson:
    deserialization:
      fail-on-unknown-properties: true

jwt:
  expiration: ${JWT_EXPIRATION}
  secret: ${JWT_SECRET}

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      